<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CopyFlow Operations Overview</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <section class="hero reveal">
        <div class="hero-nav">
          <div class="brand">copyflow</div>
          <nav class="menu">
            <button class="menu-btn active" data-tab="dashboard">dashboard</button>
            <button class="menu-btn" data-tab="management">managemanet</button>
            <button class="menu-btn" data-tab="printers">printers</button>
            <button class="menu-btn" data-tab="logs">logs</button>
          </nav>
          <div class="top-actions">
            <div class="avatar">K</div>
          </div>
        </div>

        <div class="hero-main">
          <div>
            <h1>Overview</h1>
            <p id="health">Checking health...</p>
            <ul id="kpis" class="kpi-grid"></ul>
          </div>
          <div class="hero-orbit" id="printerOrbit">
            <div class="ring"></div>
            <div class="printer-scene" aria-label="Print health">
              <div class="job-owner" id="activeJobOwner">No job</div>
              <div class="printer3d">
                <div class="printer-top"></div>
                <div class="printer-body"></div>
                <div class="printer-tray"></div>
                <div class="paper" id="printerPaper">
                  <span id="paperName">No job</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="tab-panel reveal" data-panel="dashboard">
        <section class="split-grid">
          <article class="card">
            <div class="card-head">
              <h2>Active Queue</h2>
            </div>
            <ul id="queue"></ul>
          </article>

          <article class="card">
            <div class="card-head">
              <h2>Previous Jobs (with status)</h2>
            </div>
            <ul id="jobs"></ul>
          </article>
        </section>
      </section>

      <section class="tab-panel" data-panel="management" hidden>
        <section class="split-grid">
          <article class="card">
            <div class="card-head">
              <h2>Shopkeeper Data</h2>
              <a class="text-link" href="/api/reports/jobs.csv" target="_blank" rel="noreferrer">Export CSV</a>
            </div>
            <ul id="shopkeeperStats"></ul>
          </article>

          <article class="card">
            <div class="card-head">
              <h2>Payment Reconciliation</h2>
            </div>
            <ul id="reconciliation"></ul>
          </article>
        </section>
      </section>

      <section class="tab-panel" data-panel="printers" hidden>
        <section class="card">
          <div class="card-head">
            <h2>All Printers & Status</h2>
          </div>
          <ul id="printers"></ul>
        </section>
      </section>

      <section class="tab-panel" data-panel="logs" hidden>
        <section class="split-grid">
          <article class="card">
          <div class="card-head">
              <h2>Audit</h2>
          </div>
          <ul id="audit"></ul>
          </article>

          <article class="card">
            <div class="card-head">
              <h2>Runtime Logs</h2>
            </div>
          <ul id="logs"></ul>
          </article>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
